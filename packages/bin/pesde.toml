name = "chief/bin"
version = "0.1.0"
description = "A small, strictly typed cleanup container for Roblox: connections, instances, threads, and functions, emptied in reverse insertion order."
authors = ["ryancundiff"]
repository = "https://github.com/ryancundiff/chief"
license = "MIT"
includes = ["src/*", "LICENSE", "README.md", "pesde.toml"]

[target]
environment = "roblox"
build_files = ["src"]
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"
