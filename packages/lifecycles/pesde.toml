name = "chief/lifecycles"
version = "0.1.0"
description = "The Lifecycles extension for Chief: binds events to module methods."
authors = ["ryancundiff"]
repository = "https://github.com/ryancundiff/chief"
license = "MIT"
includes = ["src/*", "LICENSE", "README.md", "pesde.toml"]

[target]
environment = "roblox"
build_files = ["src"]
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
core = { workspace = "chief/core", version = "^" }
