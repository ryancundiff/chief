name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint with selene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install tools with Rokit
        uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint with selene
        run: selene packages tests tasks

  format:
    name: Check formatting with StyLua
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install tools with Rokit
        uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting with StyLua
        run: stylua --check packages tests tasks

  typecheck:
    name: Typecheck with luau-lsp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install tools with Rokit
        uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # Each package requires its dependencies from a sibling roblox_packages/, which pesde creates.
      - name: Install packages
        run: pesde install
      # Pinned to the luau-lsp version in rokit.toml; bump both together.
      - name: Download Roblox global types
        run: curl -fsSL -o globalTypes.d.luau https://raw.githubusercontent.com/JohnnyMorganz/luau-lsp/1.68.1/scripts/globalTypes.d.luau
      # tests/ requires by instance path, which only resolves through the Rojo tree.
      - name: Generate sourcemap
        run: rojo sourcemap test.project.json --output sourcemap.json
      # LuauSolverV2 is required: packages/traits derives its types with `type function`, which the old solver cannot parse.
      # Vendored dependencies are ignored -- pesde links workspace `core` into each dependent, so one
      # error there would otherwise be reported once per dependent.
      - name: Typecheck with luau-lsp
        run: |
          luau-lsp analyze \
            --definitions=globalTypes.d.luau \
            --flag:LuauSolverV2=true \
            --sourcemap=sourcemap.json \
            --ignore="**/roblox_packages/**" \
            packages/*/src/init.luau tasks/*.luau tests/*.luau tests/Helpers/*.luau tests/Fixtures/*.luau

  tests:
    name: Run tests via Open Cloud
    runs-on: ubuntu-latest
    concurrency:
      group: luau-execution
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install tools with Rokit
        uses: CompeyDev/setup-rokit@v0.2.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install packages
        run: pesde install
      - name: Build test place
        run: rojo build test.project.json --output test-place.rbxl
      - name: Upload place and run tests
        run: python3 scripts/upload_and_run_task.py test-place.rbxl tasks/run-tests.luau
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          ROBLOX_UNIVERSE_ID: ${{ vars.ROBLOX_TEST_UNIVERSE_ID }}
          ROBLOX_PLACE_ID: ${{ vars.ROBLOX_TEST_PLACE_ID }}
