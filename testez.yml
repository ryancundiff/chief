---
# Selene standard library for TestEZ's injected spec globals.
# Referenced by selene.toml via `std = "roblox+testez"`.
globals:
  describe:
    args:
      - type: string
      - type: function
  describeFOCUS:
    args:
      - type: string
      - type: function
  describeSKIP:
    args:
      - type: string
      - type: function
  it:
    args:
      - type: string
      - type: function
  itFOCUS:
    args:
      - type: string
      - type: function
  itSKIP:
    args:
      - type: string
      - type: function
  FOCUS:
    args: []
  SKIP:
    args: []
  expect:
    args:
      - type: any
        required: false
  beforeEach:
    args:
      - type: function
  afterEach:
    args:
      - type: function
  beforeAll:
    args:
      - type: function
  afterAll:
    args:
      - type: function